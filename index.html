<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XCO Data Analysis</title>

<style>
body { margin:0; font-family: Arial; background:#f4f6f9; }
header { background:#1e3c72; color:white; padding:15px; text-align:center; font-size:24px; font-weight:bold; }
.hero { height:200px; background:url("https://images.unsplash.com/photo-1551288049-bebda4e38f71") center/cover; }
.container { width:350px; background:white; margin:-80px auto 20px; padding:25px; border-radius:12px; box-shadow:0 10px 20px rgba(0,0,0,0.2);}
input, button { width:100%; padding:10px; margin:8px 0; border-radius:8px; border:1px solid #ccc;}
button { background:#1e3c72; color:white; cursor:pointer;}
button:hover { background:#16305a;}
.success { display:none; color:green; text-align:center;}
footer { background:#1e3c72; color:white; text-align:center; padding:15px; font-size:14px;}
</style>
</head>

<body>
<header>XCO Data Analysis</header>
<div class="hero"></div>

<div class="container">
<h3>Register Now</h3>
<form id="form">
<input type="text" id="firstName" placeholder="First Name" required>
<input type="text" id="lastName" placeholder="Last Name" required>
<input type="email" id="email" placeholder="Email" required>
<div id="emailError" style="color:red;display:none;">Invalid Email</div>
<input type="text" id="phone" placeholder="Phone" required>
<div id="phoneError" style="color:red;display:none;">Invalid Phone</div>
<input type="number" id="age" placeholder="Age" required>
<button type="button" onclick="getLocation()">Get Location 📍</button>
<input type="text" id="location" placeholder="Location" readonly>
<button type="submit">Submit</button>
</form>
<div class="success" id="success">Submitted Successfully ✅</div>
</div>

<footer>
<p>Company: XCO Data Analysis</p>
<p>Phone: 01000000000</p>
<p>Email: xco@email.com</p>
<p>© 2026 XCO - All Rights Reserved</p>
</footer>

<script>
function getLocation(){
    navigator.geolocation.getCurrentPosition(pos => {
        document.getElementById("location").value = pos.coords.latitude + "," + pos.coords.longitude;
    });
}

document.getElementById("form").addEventListener("submit", async (e)=>{
    e.preventDefault();
    let email = document.getElementById("email").value;
    let phone = document.getElementById("phone").value;
    let valid = true;

    if(!email.includes("@")){ document.getElementById("emailError").style.display="block"; valid=false;}
    else{ document.getElementById("emailError").style.display="none";}

    if(!/^[0-9]{10,}$/.test(phone)){ document.getElementById("phoneError").style.display="block"; valid=false;}
    else{ document.getElementById("phoneError").style.display="none";}

    if(!valid) return;

    const data = {
        firstName: document.getElementById("firstName").value,
        lastName: document.getElementById("lastName").value,
        email: email,
        phone: phone,
        age: document.getElementById("age").value,
        location: document.getElementById("location").value
    };

    try {
        const response = await fetch("https://pubg-mobile-production-7acb.up.railway.app/save", {
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body: JSON.stringify(data)
        });
        if(response.ok){
            alert("Submitted Successfully ✅");
            form.reset();
        }else{
            alert("Error submitting data");
        }
    } catch(err){
        alert("Server not responding!");
    }
});
</script>
</body>
</html>
